mixed-port: 7890
allow-lan: true
mode: rule
log-level: info

dns:
  enable: true
  enhanced-mode: fake-ip

script:
  enable: true

mitm:
  enable: true
  hosts:
    - spclient.wg.spotify.com
    - api.spotify.com
    - "*.spotify.com"

proxies:
  - name: DIRECT
    type: direct

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - DIRECT

rules:
  - DOMAIN-SUFFIX,spotify.com,Proxy
  - MATCH,Proxy

script:
  - name: dualsubs-request
    type: http-request
    match: ^https:\/\/.*spotify\.com.*
    script: https://raw.githubusercontent.com/Fcs113322/dualsubs-clash/main/request.bundle.js

  - name: dualsubs-response
    type: http-response
    match: ^https:\/\/.*spotify\.com.*
    script: https://raw.githubusercontent.com/Fcs113322/dualsubs-clash/main/response.bundle.js
